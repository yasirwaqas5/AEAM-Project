# ============================================================
# AEAM — Google Cloud Run Deployment Manifest (SAFE MODE)
# ============================================================

apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: aeam-monolith
  labels:
    app: aeam
    layer: monolith
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all

spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/cpu-throttling: "false"

    spec:
      timeoutSeconds: 300

      containers:
        - image: gcr.io/aeam-project/aeam:latest
          name: aeam

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: 4Gi

          # ✅ FIXED ENV (NO SECRETS — SAFE MODE)
          env:
            - name: DATABASE_URL
              value: "sqlite:///./aeam.db"

            # REDIS_URL omitted because it's optional and not used in safe mode
            - name: VECTOR_DB_URL
              value: ""

            - name: ENVIRONMENT
              value: "production"

            - name: LLM_ENABLED
              value: "false"

            - name: MONITOR_INTERVAL_SECONDS
              value: "300"

            - name: MAX_INVESTIGATION_DEPTH
              value: "5"

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10

          # Startup probe (more relaxed)
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 10

  traffic:
    - percent: 100
      latestRevision: true