# ============================================================
# AEAM — Environment Configuration
# deploy/env.yaml
#
# Template for production deployment.
# Docker container names used for service discovery.
# Vector DB: Qdrant (http://aeam-qdrant:6333)
#
# IMPORTANT: Do NOT commit real secrets to version control.
# Replace placeholder values before deploying.
# ============================================================

DATABASE_URL: "postgresql://postgres:password@aeam-postgres:5432/postgres"
REDIS_URL: "redis://aeam-redis:6379/0"
VECTOR_DB_URL: "http://aeam-qdrant:6333"
ENVIRONMENT: "production"
LLM_ENABLED: "false"
MONITOR_INTERVAL_SECONDS: "300"
MAX_INVESTIGATION_DEPTH: "5"